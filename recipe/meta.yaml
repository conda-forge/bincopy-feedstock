{% set name = "bincopy" %}
{% set version = "20.1.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/bincopy-{{ version }}.tar.gz
  sha256: e94a498b9a4abe76703c3772aad466f1563b4fc9809da7965f11bc77094093b9

build:
  number: 0
  noarch: python
  entry_points:
    - bincopy=bincopy:_main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - argparse-addons >=0.4.0
    - humanfriendly
    - pyelftools
    - python >={{ python_min }}

test:
  imports:
    - bincopy
  commands:
    - pip check
    - bincopy --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/eerimoq/bincopy
  summary: Mangling of various file formats that conveys binary information (Motorola S-Record, Intel HEX and binary files).
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - nisharai1
